<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Tío Martin | Tours & Yates de Élite</title>
    
    <link rel="icon" type="image/png" href="HHRR.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-parchment: #f4eee1;     /* Tono pergamino claro de fondo */
            --bg-sand-dark: #dfd5be;     /* Arena envejecida para transiciones */
            --brand-navy: #04263a;       /* Azul oceánico profundo del logotipo */
            --accent-gold: #b38f4f;      /* Oro antiguo para detalles de precisión */
            --accent-rope: #bd5307;      /* Terracota/Cuerda náutica para realces */
            --white: #ffffff;
            --text-dark: #1b2a3a;
            --gradient-gold: linear-gradient(135deg, #bd5307 0%, #f5841a 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-parchment); color: var(--text-dark); font-family: 'Montserrat', sans-serif; line-height: 1.6; overflow-x: hidden; }

        /* LIENZO DE PARTÍCULAS BLANCAS GLOBAL */
        #smokeCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 99999;
            pointer-events: none; 
        }

        /* 1. PANTALLA DE INICIO: VINTAGE CARIBBEAN MAP STYLE */
        #welcome-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle, var(--bg-parchment) 20%, var(--bg-sand-dark) 70%, #bca777 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 9998;
            overflow: hidden;
            transition: transform 1.2s cubic-bezier(0.77, 0, 0.175, 1), opacity 1.2s ease;
            touch-action: none; 
        }

        #welcome-screen.dismissed {
            transform: translateY(-100vh);
            opacity: 0;
            pointer-events: none;
        }

        .vignette-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 30%, rgba(110, 95, 57, 0.2) 70%, rgba(4, 38, 58, 0.4) 100%);
            z-index: 2;
            pointer-events: none;
        }

        .welcome-content {
            position: relative;
            z-index: 5;
            max-width: 950px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px dashed rgba(4, 38, 58, 0.25);
            margin: 20px;
            border-radius: 4px;
        }

        .welcome-content img {
            width: 100%;
            max-width: 420px;
            height: auto;
            object-fit: contain;
            display: block;
            margin: 0 auto 25px auto;
            mix-blend-mode: multiply; 
        }

        .welcome-tag {
            font-size: 0.85rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--accent-rope);
            margin-bottom: 15px;
            font-weight: 700;
        }

        .welcome-subtitle {
            font-size: clamp(0.95rem, 2.5vw, 1.15rem);
            font-weight: 500;
            color: var(--brand-navy);
            letter-spacing: 1px;
            margin-bottom: 40px;
            max-width: 650px;
            opacity: 0.85;
        }

        .welcome-btn {
            background-color: var(--brand-navy);
            color: var(--white);
            border: 2px solid var(--accent-gold);
            padding: 18px 55px;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            font-family: 'Montserrat', sans-serif;
            box-shadow: 0 10px 30px rgba(4, 38, 58, 0.2);
        }

        .welcome-btn:hover {
            background-color: var(--white);
            color: var(--brand-navy);
            border-color: var(--brand-navy);
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(4, 38, 58, 0.3);
        }

        /* 2. INTERFAZ PRINCIPAL */
        #main-site-wrapper {
            opacity: 0;
            background-color: var(--bg-parchment);
            color: var(--brand-navy);
            transition: opacity 1s ease 0.5s;
            min-height: 100vh;
        }
        
        #main-site-wrapper.visible {
            opacity: 1;
        }

        .site-brand-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 15px 35px 15px;
            cursor: pointer;
            background: var(--bg-parchment);
            width: 100%; 
            text-align: center;
        }

        .site-brand-header span {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.8rem, 6vw, 2.8rem); 
            letter-spacing: 8px;
            margin-right: -6px; 
            text-transform: uppercase;
            color: var(--brand-navy);
            font-weight: 700;
            display: inline-block;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .site-brand-header:hover span { 
            color: var(--accent-rope);
            transform: scale(1.02);
        }

        .nav-bar { 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            background: rgba(244, 238, 225, 0.96); 
            backdrop-filter: blur(12px); 
            padding: 20px 0; 
            border-top: 1px solid rgba(4, 38, 58, 0.08);
            border-bottom: 3px double var(--accent-gold); 
            display: flex; 
            justify-content: center; 
            gap: 40px; 
        }
        
        .nav-btn { 
            background: none; 
            border: none; 
            color: var(--brand-navy); 
            font-size: 0.9rem; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            cursor: pointer; 
            opacity: 0.5; 
            font-weight: 700;
            padding-bottom: 4px;
            transition: 0.3s all;
        }
        
        .nav-btn:hover { opacity: 0.9; }
        .nav-btn.active { 
            opacity: 1; 
            color: var(--accent-rope); 
            border-bottom: 2px solid var(--accent-rope); 
        }

        #catalog-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(310px, 1fr)); gap: 35px; padding: 50px 6%; max-width: 1600px; margin: 0 auto; }
        
        .card { 
            background: var(--white); 
            border: 1px solid rgba(179, 143, 79, 0.25); 
            border-radius: 4px; 
            overflow: hidden; 
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
            opacity: 0; 
            transform: translateY(20px); 
            cursor: pointer; 
            box-shadow: 0 5px 18px rgba(4, 38, 58, 0.04);
        }
        
        .card.visible { opacity: 1; transform: translateY(0); }
        .card:hover { 
            border-color: var(--accent-gold); 
            transform: translateY(-5px); 
            box-shadow: 0 15px 30px rgba(4, 38, 58, 0.12); 
        }
        
        .img-container { width: 100%; height: 290px; position: relative; background: var(--brand-blue); overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; display: block; position: relative; z-index: 1; transition: opacity 0.3s ease, transform 0.6s ease; }
        .card:hover img { transform: scale(1.04); }

        .card-info { padding: 25px; background: var(--white); border-top: 1px solid rgba(179, 143, 79, 0.1); }
        .card-title { font-family: 'Cinzel', serif; font-size: 1.35rem; color: var(--brand-navy); font-weight: 700; letter-spacing: 1px; margin-bottom: 5px; }
        .card-price { color: var(--accent-rope); font-weight: 700; font-size: 1.05rem; letter-spacing: 0.5px; }

        /* MODAL */
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(4, 38, 58, 0.5); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal-content { background: var(--white); width: 100%; max-width: 1050px; max-height: 85vh; overflow-y: auto; border-radius: 6px; position: relative; border: 1px solid var(--accent-gold); box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 2.5rem; color: var(--brand-navy); cursor: pointer; z-index: 10; opacity: 0.7; transition: 0.3s; }
        .modal-close:hover { opacity: 1; }
        
        .modal-grid { display: grid; grid-template-columns: 1fr 1fr; }
        .modal-gallery { background: #01111a; min-height: 400px; overflow: hidden; display: flex; align-items: center; }
        
        .modal-details { padding: 45px; color: var(--text-dark); background: var(--white); }
        .modal-title { font-family: 'Cinzel', serif; font-size: 2.4rem; color: var(--brand-navy); font-weight: 700; line-height: 1.2; margin-bottom: 5px; }
        
        .btn-wa { 
            display: block; 
            text-align: center; 
            background: var(--brand-navy); 
            color: var(--white); 
            text-decoration: none; 
            padding: 18px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            margin-top: 35px; 
            border-radius: 4px; 
            border: 1px solid var(--accent-gold);
            box-shadow: 0 6px 20px rgba(4, 38, 58, 0.15); 
            transition: 0.3s all; 
        }
        .btn-wa:hover { 
            background: var(--gradient-gold); 
            border-color: transparent;
            transform: translateY(-2px); 
            box-shadow: 0 10px 25px rgba(245, 132, 26, 0.4); 
        }

        #lightbox-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(4, 38, 58, 0.97); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 3000; cursor: zoom-out; }
        #lightbox-overlay img { max-width: 90%; max-height: 90vh; border: 2px solid var(--accent-gold); border-radius: 4px; }
        
        @media (max-width: 850px) { .modal-grid { grid-template-columns: 1fr; } .modal-details { padding: 35px; } .img-container { height: 240px; } }
    </style>
</head>
<body>

    <canvas id="smokeCanvas"></canvas>

    <div id="welcome-screen">
        <div class="vignette-overlay"></div>
        <div class="welcome-content">
            <img id="main-brand-logo" src="HHRR.png" alt="El Tío Martin Logo - Tours y Yates">
            <span class="welcome-tag">Experiencias inolvidables</span>
            <p class="welcome-subtitle">Vive y disfruta del caribe como nunca antes</p>
            <button class="welcome-btn" onclick="startExperience()">Comenzar navegación</button>
        </div>
    </div>

    <div id="main-site-wrapper">
        <div class="site-brand-header" onclick="backToWelcome()">
            <span>El Tío Martin</span>
        </div>

        <nav class="nav-bar">
            <button id="btnTour" class="nav-btn active" onclick="filter('tour')">Experiencias</button>
            <button id="btnYate" class="nav-btn" onclick="filter('yate')">Nuestra Flota</button>
        </nav>

        <main id="catalog-grid"></main>
    </div>

    <div id="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div id="modal-body" class="modal-grid"></div>
        </div>
    </div>

    <div id="lightbox-overlay" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="Vista Completa">
    </div>

    <script>
        const TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRepSmGtFPCh9RkPwFrprV565aDE5tIgnUDUjvvkYaYCX_Mkf-zVLMx5mJL_jbAm97MYM7SLV6-hdd6/pub?output=tsv';
        const GITHUB_RAW = 'https://raw.githubusercontent.com/beamazingcolors/eltiomartin/main/';

        let fullData = [];
        let isMainSiteActive = false;

        function startExperience() {
            document.getElementById('welcome-screen').classList.add('dismissed');
            document.getElementById('main-site-wrapper').classList.add('visible');
            isMainSiteActive = true;
        }

        function backToWelcome() {
            document.getElementById('welcome-screen').classList.remove('dismissed');
            document.getElementById('main-site-wrapper').classList.remove('visible');
            isMainSiteActive = false;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        /* MOTOR DE PARTÍCULAS BLANCAS */
        const canvas = document.getElementById('smokeCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class SmokeParticle {
            constructor(isFromMouse = false, mouseX = 0, mouseY = 0) {
                this.isMouse = isFromMouse;
                if (this.isMouse) {
                    this.x = mouseX + (Math.random() - 0.5) * 4;  
                    this.y = mouseY + (Math.random() - 0.5) * 4;
                    this.size = Math.random() * 3.5 + 1.2;         
                    this.growth = -(Math.random() * 0.03 + 0.015); 
                    this.speedY = -(Math.random() * 1.0 + 0.5);   
                    this.speedX = (Math.random() - 0.5) * 1.0;   
                    this.alpha = 0.9;                               
                    this.decay = Math.random() * 0.014 + 0.010;   
                }
            }
            update() {
                if (this.isMouse) {
                    this.x += this.speedX; 
                    this.y += this.speedY; 
                    this.size += this.growth; 
                    this.alpha -= this.decay;
                    if (this.size < 0.1) this.size = 0.1;
                }
            }
            draw() {
                if (!this.isMouse || this.alpha <= 0 || this.size <= 0.1) return;
                ctx.save();
                const gradient = ctx.createRadialGradient(this.x, this.y, 0.1, this.x, this.y, this.size);
                let colorBase = `rgba(255, 255, 255, `;
                gradient.addColorStop(0, colorBase + `${this.alpha})`);
                gradient.addColorStop(0.4, colorBase + `${this.alpha * 0.5})`);
                gradient.addColorStop(1, colorBase + '0)');
                
                ctx.fillStyle = gradient; 
                ctx.beginPath(); 
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); 
                ctx.fill(); 
                ctx.restore();
            }
        }
        
        window.addEventListener('mousemove', (e) => {
            for (let i = 0; i < 3; i++) { particles.push(new SmokeParticle(true, e.clientX, e.clientY)); }
        });
        
        window.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            for (let i = 0; i < 2; i++) { particles.push(new SmokeParticle(true, touch.clientX, touch.clientY)); }
        }, { passive: true });

        function animateSmoke() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0 || particles[i].size <= 0.1) { 
                    particles.splice(i, 1); 
                } 
            }
            requestAnimationFrame(animateSmoke);
        }
        animateSmoke();

        /* PARSEO DE DATOS INTELIGENTE */
        function getCleanValue(item, possibleHeaders) {
            if (!item) return '';
            for (let originalKey in item) {
                let normalizedKey = originalKey.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
                for (let header of possibleHeaders) {
                    let normalizedHeader = header.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
                    if (normalizedKey === normalizedHeader) {
                        let val = item[originalKey]?.trim();
                        if (!val || val.toLowerCase() === 'undefined' || val.toLowerCase() === 'null') return '';
                        return val;
                    }
                }
            }
            return '';
        }

        function getImgUrlByCodigo(codigoValue) {
            if (!codigoValue || codigoValue === '') return '';
            let fileName = codigoValue.trim();
            if (!fileName.toLowerCase().endsWith('.jpg') && !fileName.toLowerCase().endsWith('.jpeg') && !fileName.toLowerCase().endsWith('.png')) {
                fileName += '.jpg';
            }
            return GITHUB_RAW + encodeURIComponent(fileName);
        }

        /* SISTEMA AUTOCORRECTOR DE ENLACES DE IMAGEN (SOPORTE DE SUEFIJOS -1, MINÚSCULAS Y ESPACIOS) */
        function handleImgError(img, codigo) {
            if (!img.dataset.step) img.dataset.step = "0";
            let step = parseInt(img.dataset.step);
            let fileName = codigo.trim();
            
            if (step === 0) {
                // Intento 2: Añadir el guion "-1" antiguo (ej: ANGELINA-1.jpg)
                img.dataset.step = "1";
                if (!fileName.includes('-1')) {
                    img.src = GITHUB_RAW + encodeURIComponent(fileName + '-1.jpg');
                    return;
                }
            } 
            if (step === 1 || (step === 0 && fileName.includes('-1'))) {
                // Intento 3: Pasar a minúsculas y reemplazar espacios por guiones medios (ej: big-time.jpg)
                img.dataset.step = "2";
                let cleanName = fileName.replace(/\s+/g, '-').toLowerCase();
                img.src = GITHUB_RAW + encodeURIComponent(cleanName + '.jpg');
                return;
            }
            if (step === 2) {
                // Intento 4: Combinar minúsculas con el guion "-1" final (ej: big-time-1.jpg)
                img.dataset.step = "3";
                let cleanName = fileName.replace(/\s+/g, '-').toLowerCase();
                if (!cleanName.includes('-1')) {
                    img.src = GITHUB_RAW + encodeURIComponent(cleanName + '-1.jpg');
                    return;
                }
            }
            // Si todo falla por completo, se oculta la imagen vacía con sutileza
            img.style.opacity = '0';
        }

        async function init() {
            try {
                const response = await fetch(TSV_URL);
                const text = await response.text();
                const rows = text.replace(/\r/g, '').split('\n').filter(r => r.trim() !== '').map(r => r.split('\t'));
                const headers = rows[0].map(h => h.trim());
                fullData = rows.slice(1).map(row => {
                    let item = {}; headers.forEach((h, i) => { item[h] = row[i]?.trim(); }); return item;
                });
                filter('tour');
            } catch (err) { console.error(err); }
        }

        function filter(category) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.toggle('active', btn.innerText.toLowerCase().includes(category === 'tour' ? 'exp' : 'flota')));
            const grid = document.getElementById('catalog-grid'); grid.innerHTML = '';
            const filtered = fullData.filter(item => getCleanValue(item, ['TIPO', 'Tipo']).toLowerCase().includes(category.toLowerCase()));
            filtered.forEach((item, idx) => {
                const card = document.createElement('div'); card.className = 'card';
                let nombre = getCleanValue(item, ['Nombre', 'NOMBRE']);
                card.onclick = () => openModal(nombre);
                let codigo = getCleanValue(item, ['Codigo', 'Código', 'CDG']);
                let imgUrl = getImgUrlByCodigo(codigo);
                let pies = getCleanValue(item, ['Pies', 'PIES']);
                let precio = getCleanValue(item, ['Precio', 'PRECIO']) || '';
                
                card.innerHTML = `
                    <div class="img-container">
                        ${imgUrl ? `<img src="${imgUrl}" onerror="handleImgError(this, '${codigo}')">` : ''}
                    </div>
                    <div class="card-info">
                        <span style="color:var(--accent-gold); font-size:0.75rem; font-weight:700; letter-spacing:2px; text-transform:uppercase;">${pies ? pies + ' Pies' : 'Premium Tour'}</span>
                        <h2 class="card-title">${nombre}</h2>
                        <p class="card-price">${precio}</p>
                    </div>
                `;
                grid.appendChild(card); setTimeout(() => card.classList.add('visible'), idx * 80);
            });
        }

        function openModal(nombreBusqueda) {
            const item = fullData.find(i => getCleanValue(i, ['Nombre', 'NOMBRE']) === nombreBusqueda);
            const body = document.getElementById('modal-body');
            let nombre = getCleanValue(item, ['Nombre', 'NOMBRE']);
            let precio = getCleanValue(item, ['Precio', 'PRECIO']) || '';
            let desc = getCleanValue(item, ['Descriptivo', 'Detalles']) || 'Ficha técnica de navegación disponible mediante concierge.';
            let codigo = getCleanValue(item, ['Codigo', 'Código', 'CDG']);
            let imgUrl = getImgUrlByCodigo(codigo);
            
            let duracion = getCleanValue(item, ['Duracion', 'DURACIÓN', 'Tiempo']);
            let capacidad = getCleanValue(item, ['Capacidad', 'CAPACIDAD', 'Pasajeros', 'Capacidad de personas']);
            let ubicacion = getCleanValue(item, ['Ubicacion', 'UBICACIÓN', 'Lugar', 'Destino']);
            let incluye = getCleanValue(item, ['Incluye', 'INCLUYE', 'Incluye:']);

            let specsHtml = '';
            if (duracion || capacidad || ubicacion) {
                specsHtml = `<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 15px; margin: 20px 0; padding: 15px 0; border-top: 1px dashed rgba(179,143,79,0.3); border-bottom: 1px dashed rgba(179,143,79,0.3);">`;
                if (duracion) specsHtml += `<div><span style="font-family:'Cinzel'; font-size:0.75rem; color:var(--accent-rope); font-weight:700; display:block; text-transform:uppercase; letter-spacing:1px;">Duración</span><span style="font-size:0.9rem; color:var(--brand-navy); font-weight:600;">${duracion}</span></div>`;
                if (capacidad) specsHtml += `<div><span style="font-family:'Cinzel'; font-size:0.75rem; color:var(--accent-rope); font-weight:700; display:block; text-transform:uppercase; letter-spacing:1px;">Capacidad</span><span style="font-size:0.9rem; color:var(--brand-navy); font-weight:600;">${capacidad}</span></div>`;
                if (ubicacion) specsHtml += `<div><span style="font-family:'Cinzel'; font-size:0.75rem; color:var(--accent-rope); font-weight:700; display:block; text-transform:uppercase; letter-spacing:1px;">Ubicación</span><span style="font-size:0.9rem; color:var(--brand-navy); font-weight:600;">${ubicacion}</span></div>`;
                specsHtml += `</div>`;
            }

            let incluyeHtml = '';
            if (incluye) {
                incluyeHtml = `
                    <div style="margin-top: 25px;">
                        <span style="font-family:'Cinzel'; font-size:0.8rem; color:var(--brand-navy); font-weight:700; display:block; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px;">El viaje incluye</span>
                        <div style="background: rgba(179, 143, 79, 0.05); border-left: 3px solid var(--accent-gold); padding: 15px 20px; font-size: 0.9rem; color: #3b424a; line-height: 1.6; border-radius: 0 4px 4px 0;">
                            ${incluye}
                        </div>
                    </div>
                `;
            }
            
            body.innerHTML = `
                <div class="modal-gallery">
                    ${imgUrl ? `<img src="${imgUrl}" onerror="handleImgError(this, '${codigo}')" onclick="openLightbox('${imgUrl}')" style="width:100%; height:100%; object-fit:cover; display:block; cursor:zoom-in;">` : ''}
                </div>
                <div class="modal-details">
                    <h1 class="modal-title">${nombre}</h1>
                    ${precio ? `<p class="card-price" style="font-size:1.6rem; margin-bottom:10px;">${precio}</p>` : ''}
                    
                    ${specsHtml}
                    
                    <p style="font-size:0.95rem; color:#333; margin-top:15px; line-height:1.7; font-weight:400;">${desc}</p>
